openapi: 3.0.3
info:
  title: SIU-2 Backend API
  version: 1.0.0
  description: Documentación OpenAPI 3.0 generada exclusivamente a partir de los routers definidos en routes/.
servers:
  - url: http://localhost:5000/api
    description: Servidor local

tags:
  - name: Auth
  - name: Usuarios
  - name: Estudiantes
  - name: Profesores
  - name: Materias
  - name: Cursos
  - name: Evaluaciones
  - name: Equipos
  - name: EquipoIntegrantes
  - name: CursoUsuarios
  - name: Notas
  - name: Clases
  - name: Logs
  - name: Asistencia
  - name: Reportes
  - name: Materiales
  - name: Email

security:
  - CookieAuth: []

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token_cookie
      description: Cookie con el JWT de sesión.

  schemas:
    ErrorItem:
      type: object
      required:
        - code
        - message
        - level
      properties:
        code:
          type: string
        message:
          type: string
        level:
          type: string
        description:
          type: string

    ErrorResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorItem'

    HealthResponse:
      type: object
      required:
        - resource
        - status
      properties:
        resource:
          type: string
        status:
          type: string

    AuthLoginRequest:
      type: object
      required:
        - dni
        - password
      properties:
        dni:
          type: integer
        password:
          type: string

    AuthLoginResponse:
      type: object
      required:
        - mensaje
        - token
      properties:
        mensaje:
          type: string
        token:
          type: string

    AuthSignupRequest:
      type: object
      required:
        - nombre
        - apellido
        - dni
        - email
        - password
      properties:
        nombre:
          type: string
        apellido:
          type: string
        dni:
          type: integer
        email:
          type: string
        password:
          type: string

    Usuario:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        dni:
          type: integer
        es_admin:
          type: boolean
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time

    UsuarioCreateRequest:
      type: object
      required:
        - nombre
        - apellido
        - dni
        - email
        - password
      properties:
        nombre:
          type: string
        apellido:
          type: string
        dni:
          type: integer
        email:
          type: string
        password:
          type: string
        es_admin:
          type: boolean

    UsuarioUpdateRequest:
      type: object
      required:
        - nombre
        - apellido
        - dni
        - email
        - activo
      properties:
        nombre:
          type: string
        apellido:
          type: string
        dni:
          type: integer
        email:
          type: string
        activo:
          type: boolean
        es_admin:
          type: boolean

    PerfilesResponse:
      type: object
      required:
        - perfiles
      properties:
        perfiles:
          type: array
          items:
            type: string
            enum: [admin, docente, alumno]

    Materia:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        codigo:
          type: string
          nullable: true

    MateriaCreateRequest:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
        codigo:
          type: string
          nullable: true

    MateriaUpdateRequest:
      type: object
      required:
        - nombre
        - codigo
      properties:
        nombre:
          type: string
        codigo:
          type: string
          nullable: true

    Curso:
      type: object
      properties:
        id:
          type: integer
        materia_id:
          type: integer
        nombre:
          type: string
        anio:
          type: integer
        cuatrimestre:
          type: integer

    CursoCreateRequest:
      type: object
      required:
        - materia_id
        - nombre
        - anio
        - cuatrimestre
      properties:
        materia_id:
          type: integer
        nombre:
          type: string
        anio:
          type: integer
        cuatrimestre:
          type: integer

    CursoUpdateRequest:
      type: object
      required:
        - materia_id
        - nombre
        - anio
        - cuatrimestre
      properties:
        materia_id:
          type: integer
        nombre:
          type: string
        anio:
          type: integer
        cuatrimestre:
          type: integer

    Estudiante:
      type: object
      properties:
        id:
          type: integer
        usuario_id:
          type: integer
        padron:
          type: integer
        carrera:
          type: string
        anio_ingreso:
          type: integer
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        dni:
          type: integer

    EstudianteCreateRequest:
      type: object
      required:
        - usuario_id
        - padron
        - carrera
        - anio_ingreso
      properties:
        usuario_id:
          type: integer
        padron:
          type: integer
        carrera:
          type: string
        anio_ingreso:
          type: integer

    EstudianteUpdateRequest:
      type: object
      required:
        - padron
        - carrera
        - anio_ingreso
        - activo
      properties:
        padron:
          type: integer
        carrera:
          type: string
        anio_ingreso:
          type: integer
        activo:
          type: boolean

    EstudiantePatchRequest:
      type: object
      minProperties: 1
      properties:
        padron:
          type: integer
        carrera:
          type: string
        anio_ingreso:
          type: integer
        activo:
          type: boolean

    Profesor:
      type: object
      properties:
        id:
          type: integer
        usuario_id:
          type: integer
        legajo:
          type: integer
        titulo:
          type: string
        departamento:
          type: string
        fecha_ingreso:
          type: string
          format: date
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        dni:
          type: integer

    ProfesorCreateRequest:
      type: object
      required:
        - usuario_id
        - legajo
        - titulo
        - departamento
        - fecha_ingreso
      properties:
        usuario_id:
          type: integer
        legajo:
          type: integer
        titulo:
          type: string
        departamento:
          type: string
        fecha_ingreso:
          type: string
          format: date

    ProfesorUpdateRequest:
      type: object
      required:
        - legajo
        - titulo
        - departamento
        - fecha_ingreso
        - activo
      properties:
        legajo:
          type: integer
        titulo:
          type: string
        departamento:
          type: string
        fecha_ingreso:
          type: string
          format: date
        activo:
          type: boolean

    ProfesorPatchRequest:
      type: object
      minProperties: 1
      properties:
        legajo:
          type: integer
        titulo:
          type: string
        departamento:
          type: string
        fecha_ingreso:
          type: string
          format: date
        activo:
          type: boolean

    Clase:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        profesor_id:
          type: integer
        curso_id:
          type: integer
        fecha_hora_inicio:
          type: string
          format: date-time
        fecha_hora_fin:
          type: string
          format: date-time
        tema:
          type: string
          nullable: true
        status:
          type: string
          enum: [pendiente, suspendida, en curso, finalizada]
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    ClaseCreateRequest:
      type: object
      required:
        - nombre
        - profesor_id
        - curso_id
        - fecha_hora_inicio
        - fecha_hora_fin
      properties:
        nombre:
          type: string
        profesor_id:
          type: integer
        curso_id:
          type: integer
        fecha_hora_inicio:
          type: string
          format: date-time
        fecha_hora_fin:
          type: string
          format: date-time
        tema:
          type: string
        status:
          type: string
          enum: [pendiente, suspendida, en curso, finalizada]

    ClaseUpdateRequest:
      type: object
      required:
        - nombre
        - profesor_id
        - curso_id
        - fecha_hora_inicio
        - fecha_hora_fin
      properties:
        nombre:
          type: string
        profesor_id:
          type: integer
        curso_id:
          type: integer
        fecha_hora_inicio:
          type: string
          format: date-time
        fecha_hora_fin:
          type: string
          format: date-time
        tema:
          type: string
        status:
          type: string
          enum: [pendiente, suspendida, en curso, finalizada]

    ClasePatchRequest:
      type: object
      properties:
        nombre:
          type: string
        profesor_id:
          type: integer
        curso_id:
          type: integer
        fecha_hora_inicio:
          type: string
          format: date-time
        fecha_hora_fin:
          type: string
          format: date-time
        tema:
          type: string
        status:
          type: string
          enum: [pendiente, suspendida, en curso, finalizada]

    ClaseEstadoItem:
      type: object
      required:
        - id
        - nombre
      properties:
        id:
          type: integer
        nombre:
          type: string

    Evaluacion:
      type: object
      properties:
        id:
          type: integer
        curso_id:
          type: integer
        tipo_evaluacion_id:
          type: integer
        titulo:
          type: string
        descripcion:
          type: string
          nullable: true
        fecha:
          type: string
          format: date
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time
        es_grupal:
          type: boolean
        tipo_evaluacion:
          type: string

    EvaluacionCreateRequest:
      type: object
      required:
        - curso_id
        - tipo_evaluacion_id
        - titulo
        - fecha
      properties:
        curso_id:
          type: integer
        tipo_evaluacion_id:
          type: integer
        titulo:
          type: string
        descripcion:
          type: string
          nullable: true
        fecha:
          type: string
          format: date

    EvaluacionUpdateRequest:
      type: object
      required:
        - curso_id
        - tipo_evaluacion_id
        - titulo
        - fecha
        - activo
      properties:
        curso_id:
          type: integer
        tipo_evaluacion_id:
          type: integer
        titulo:
          type: string
        descripcion:
          type: string
          nullable: true
        fecha:
          type: string
          format: date
        activo:
          type: boolean

    Equipo:
      type: object
      properties:
        id:
          type: integer
        curso_id:
          type: integer
        evaluacion_id:
          type: integer
        nombre:
          type: string
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time

    EquipoCreateRequest:
      type: object
      required:
        - curso_id
        - evaluacion_id
        - nombre
      properties:
        curso_id:
          type: integer
        evaluacion_id:
          type: integer
        nombre:
          type: string

    EquipoUpdateRequest:
      type: object
      required:
        - curso_id
        - evaluacion_id
        - nombre
        - activo
      properties:
        curso_id:
          type: integer
        evaluacion_id:
          type: integer
        nombre:
          type: string
        activo:
          type: boolean

    CursoUsuario:
      type: object
      properties:
        id:
          type: integer
        usuario_id:
          type: integer
        curso_id:
          type: integer
        estado:
          type: string
          enum: [activo, suspendido, baja]

    CursoUsuarioCreateRequest:
      type: object
      required:
        - usuario_id
        - curso_id
      properties:
        usuario_id:
          type: integer
        curso_id:
          type: integer
        estado:
          type: string
          enum: [activo, suspendido, baja]

    CursoUsuarioUpdateRequest:
      type: object
      required:
        - usuario_id
        - curso_id
        - estado
      properties:
        usuario_id:
          type: integer
        curso_id:
          type: integer
        estado:
          type: string
          enum: [activo, suspendido, baja]

    EquipoIntegrante:
      type: object
      properties:
        equipo_id:
          type: integer
        alumno_id:
          type: integer
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        activo:
          type: boolean

    EquipoIntegranteCreateRequest:
      type: object
      required:
        - equipo_id
        - alumno_id
      properties:
        equipo_id:
          type: integer
        alumno_id:
          type: integer

    Nota:
      type: object
      properties:
        id:
          type: integer
        evaluacion_id:
          type: integer
        alumno_id:
          type: integer
          nullable: true
        equipo_id:
          type: integer
          nullable: true
        nota:
          type: number
        observaciones:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    NotaIndividualCreateRequest:
      type: object
      required:
        - evaluacion_id
        - alumno_id
        - nota
      properties:
        evaluacion_id:
          type: integer
        alumno_id:
          type: integer
        nota:
          type: number
        observaciones:
          type: string
          nullable: true

    NotaGrupalCreateRequest:
      type: object
      required:
        - evaluacion_id
        - equipo_id
        - nota
      properties:
        evaluacion_id:
          type: integer
        equipo_id:
          type: integer
        nota:
          type: number
        observaciones:
          type: string
          nullable: true

    NotaCreateRequest:
      oneOf:
        - $ref: '#/components/schemas/NotaIndividualCreateRequest'
        - $ref: '#/components/schemas/NotaGrupalCreateRequest'

    NotaUpdateRequest:
      type: object
      required:
        - nota
      properties:
        nota:
          type: number

  responses:
    BadRequest:
      description: Solicitud inválida o datos de entrada no válidos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Falta la cookie de autenticación, el token es inválido o expiró.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: El usuario autenticado no posee el rol requerido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: El recurso solicitado no existe.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: El recurso ya existe o viola una restricción de unicidad.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error inesperado del servidor.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Sesión iniciada correctamente.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/signup:
    post:
      tags: [Auth]
      summary: Registrar un nuevo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSignupRequest'
      responses:
        '200':
          description: Usuario registrado correctamente.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [usuario]
                properties:
                  usuario:
                    $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me/perfiles:
    get:
      tags: [Auth]
      summary: Obtener los perfiles activos del usuario autenticado
      responses:
        '200':
          description: Perfiles recalculados desde la base de datos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /usuarios:
    get:
      tags: [Usuarios]
      summary: Listar usuarios
      parameters:
        - name: nombre
          in: query
          schema:
            type: string
        - name: apellido
          in: query
          schema:
            type: string
        - name: dni
          in: query
          schema:
            type: integer
        - name: email
          in: query
          schema:
            type: string
        - name: rol
          in: query
          schema:
            type: string
            enum: [admin, alumno, docente, pendiente]
      responses:
        '200':
          description: Lista de usuarios.
          content:
            application/json:
              schema:
                type: object
                required: [usuarios, total]
                properties:
                  usuarios:
                    type: array
                    items:
                      $ref: '#/components/schemas/Usuario'
                  total:
                    type: integer
        '204':
          description: Sin resultados.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Usuarios]
      summary: Crear un usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioCreateRequest'
      responses:
        '201':
          description: Usuario creado exitosamente.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [message, usuario]
                properties:
                  message:
                    type: string
                  usuario:
                    $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /usuarios/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Usuarios]
      summary: Obtener un usuario por ID
      responses:
        '200':
          description: Usuario encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Usuarios]
      summary: Reemplazar un usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioUpdateRequest'
      responses:
        '204':
          description: Usuario actualizado correctamente.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Usuarios]
      summary: Eliminar lógicamente un usuario
      responses:
        '204':
          description: Usuario eliminado correctamente.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /estudiantes:
    get:
      tags: [Estudiantes]
      summary: Listar estudiantes
      parameters:
        - name: carrera
          in: query
          schema:
            type: string
        - name: anio_ingreso
          in: query
          schema:
            type: integer
        - name: activo
          in: query
          schema:
            type: boolean
        - name: usuario_id
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Lista paginada de estudiantes.
          content:
            application/json:
              schema:
                type: object
                required: [estudiantes, total, page, page_size, total_paginas]
                properties:
                  estudiantes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Estudiante'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
                  total_paginas:
                    type: integer
        '204':
          description: Sin resultados.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Estudiantes]
      summary: Crear un estudiante
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstudianteCreateRequest'
      responses:
        '201':
          description: Estudiante creado correctamente.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [message, estudiante]
                properties:
                  message:
                    type: string
                  estudiante:
                    $ref: '#/components/schemas/Estudiante'
        '400':
