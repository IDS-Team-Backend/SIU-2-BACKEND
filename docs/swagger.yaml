openapi: 3.0.0
info:
  title: API - Sistema de Gestión Universitaria
  description: Endpoints para el proyecto integrador. Filtrado por curso_id y soporte para Soft Delete.
  version: 1.2.0
servers:
  - url: http://localhost:5000/api
    description: Servidor de Desarrollo (Flask)

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token_cookie
      description: Cookie que contiene el token JWT de sesión del SIU.

  schemas:
    Clase:
      type: object
      properties:
        id:
          type: integer
          example: 12
        nombre:
          type: string
          example: "Clase 01: Introducción a SQL"
        profesor_id:
          type: integer
          example: 4
        curso_id:
          type: integer
          example: 2
        fecha_hora_inicio:
          type: string
          format: date-time
          example: "2026-05-22T19:00:00Z"
        fecha_hora_fin:
          type: string
          format: date-time
          example: "2026-05-22T20:30:00Z"
        tema:
          type: string
          nullable: true
          example: "Modelo Entidad-Relación y Normalización"
        status:
          type: string
          enum: [pendiente, suspendida, en curso, finalizada]
          example: "pendiente"
        created_at:
          type: string
          format: date-time
          example: "2026-05-21T22:15:00Z"

    ClaseInput:
      type: object
      required:
        - nombre
        - profesor_id
        - curso_id
        - fecha_hora_inicio
        - fecha_hora_fin
      properties:
        nombre:
          type: string
          maxLength: 80
          example: "Clase Práctica Repaso"
        profesor_id:
          type: integer
          example: 5
        curso_id:
          type: integer
          example: 1
        fecha_hora_inicio:
          type: string
          format: date-time
          example: "2026-06-01T14:30:00Z"
        fecha_hora_fin:
          type: string
          format: date-time
          example: "2026-06-01T16:00:00Z"
        tema:
          type: string
          maxLength: 255
          example: "Resolución de ejercicios tipo parcial"
        status:
          type: string
          enum: [pendiente, suspendida, en curso, finalizada]
          example: "pendiente"

  responses:
    400BadRequest:
      description: Datos inválidos o lógicamente incorrectos (ValidationError).
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "La fecha de la clase no puede ser anterior a la fecha actual."
    401Unauthorized:
      description: Sesión no iniciada o token expirado (UnauthorizedError).
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "No se encontró un token de autenticación en la cookie."
    403Forbidden:
      description: El usuario carece de los privilegios de rol necesarios (ForbiddenError).
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Acceso denegado. No tenés los permisos necesarios."
    404NotFound:
      description: El recurso solicitado no existe en el sistema (NotFoundError).
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "No se encontró la clase con el ID especificado."
  schemas:
    Estudiante:
      type: object
      properties:
        id: { type: integer }
        usuario_id: { type: integer }
        padron: { type: integer }
        carrera: { type: string }
        anio_ingreso: { type: integer }
        activo: { type: boolean }
        created_at: { type: string, format: date-time }
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string }
        dni: { type: integer }
    Profesor:
      type: object
      properties:
        id: { type: integer }
        usuario_id: { type: integer }
        legajo: { type: integer }
        titulo: { type: string }
        departamento: { type: string }
        fecha_ingreso: { type: string, format: date }
        activo: { type: boolean }
        created_at: { type: string, format: date-time }
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string }
        dni: { type: integer }
    JWTPayload:
      type: object
      description: |
        Payload del JWT emitido por /auth/login. `perfiles` lista los perfiles
        activos del usuario en el momento del login (ej. ["admin", "docente", "estudiante"]).
        Para perfiles recalculados en vivo (sin re-loguearse) usar GET /auth/me/perfiles.
      properties:
        id: { type: integer }
        nombre: { type: string }
        apellido: { type: string }
        perfiles:
          type: array
          items: { type: string, enum: [admin, docente, estudiante, ayudante] }
        exp: { type: integer }

security:
  - CookieAuth: []

paths:
  # ================= AUTH & LOGS =================
  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      security: [] 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dni: { type: integer }
                password: { type: string }
      responses:
        '200':
          description: Login exitoso devuelve token

  /auth/signup:
    post:
      summary: Registrar un nuevo usuario sin perfiles asignados
      description: |
        Crea un usuario sin perfiles. Es el admin quien luego le asigna perfil
        estudiante (POST /estudiantes) o docente (POST /profesores).
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, apellido, dni, email, password]
              properties:
                nombre: { type: string }
                apellido: { type: string }
                dni: { type: integer }
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Usuario registrado

  /auth/me/perfiles:
    get:
      summary: Perfiles del usuario logueado, recalculados desde DB
      description: |
        A diferencia del JWT (que lleva los perfiles del momento del login),
        este endpoint recalcula los perfiles en tiempo real. Útil cuando el
        admin asigna un nuevo perfil después del login.
      tags: [Auth]
      responses:
        '200':
          description: Lista de perfiles del usuario
          content:
            application/json:
              schema:
                type: object
                properties:
                  perfiles:
                    type: array
                    items: { type: string, enum: [admin, docente, estudiante] }
        '401':
          description: Token ausente o inválido

  /logs:
    get:
      summary: Obtener registro de actividad
      tags: [Logs]
      parameters:
        - name: usuario_id
          in: query
          schema: { type: integer }
          description: Filtrar por ID de usuario
        - name: accion
          in: query
          schema: { type: string }
          description: Filtrar por tipo de acción (POST, DELETE, etc)
        - name: fecha_desde
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Lista de logs filtrada

  # ================= ABM ALUMNOS =================
  /alumnos:
    get:
      summary: Listar todos los alumnos
      tags: [Alumnos]
      parameters:
        - name: materia_id
          in: query
          schema: { type: integer }
          description: Filtrar alumnos pertenecientes a una materia específica
        - name: curso_id
          in: query
          schema: { type: integer }
          description: Filtrar alumnos pertenecientes a un curso específico
        - name: estado
          in: query
          schema: { type: string, enum: [activos, baja, todos] }
          description: Filtrar por estado de cursada (baja representa abandono)
      responses:
        '200':
          description: Lista de alumnos
    post:
      summary: Crear un nuevo alumno manualmente
      tags: [Alumnos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuario_id: { type: integer }
                curso_id: { type: integer }
      responses:
        '201':
          description: Alumno creado

  /alumnos/{id}:
    put:
      summary: Actualizar datos de un alumno
      tags: [Alumnos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                apellido: { type: string }
                email: { type: string }
      responses:
        '200':
          description: Alumno actualizado
    delete:
      summary: Dar de baja un alumno (no lo elimina de la DB)
      description: Cambia el atributo interno a 'abandonó' sin eliminar la fila de MySQL.
      tags: [Alumnos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Alumno dado de baja exitosamente en el sistema

  /alumnos/csv:
    post:
      summary: Importar alumnos masivamente desde archivo CSV (quiza se puede ahorrar esta ruta y tener un solo post /alumnos)
      tags: [Alumnos]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                archivo: { type: string, format: binary }
                curso_id: { type: integer, description: "Curso al que se van a incorporar" }
      responses:
        '200':
          description: CSV procesado e importado con éxito

  # ================= ABM ESTUDIANTES =================
  /estudiantes:
    get:
      summary: Listar perfiles de estudiante (con datos del usuario asociado)
      tags: [Estudiantes]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: carrera
          in: query
          schema: { type: string }
        - name: anio_ingreso
          in: query
          schema: { type: integer }
        - name: activo
          in: query
          schema: { type: boolean }
        - name: usuario_id
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Lista de estudiantes
          content:
            application/json:
              schema:
                type: object
                properties:
                  estudiantes:
                    type: array
                    items: { $ref: '#/components/schemas/Estudiante' }
                  total: { type: integer }
                  page: { type: integer }
                  page_size: { type: integer }
                  total_paginas: { type: integer }
        '204':
          description: Sin resultados
        '400':
          description: Filtro no permitido
        '401':
          description: Token ausente o inválido
    post:
      summary: Crear un perfil estudiante para un usuario existente (sólo admin)
      tags: [Estudiantes]
      security: [{ CookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario_id, padron, carrera, anio_ingreso]
              properties:
                usuario_id: { type: integer }
                padron: { type: integer }
                carrera: { type: string }
                anio_ingreso: { type: integer, description: "Entre 1900 y el año actual + 1" }
      responses:
        '201':
          description: Perfil estudiante creado
        '400':
          description: Body inválido
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos (sólo admin)
        '404':
          description: No existe el usuario indicado
        '409':
          description: El usuario ya tiene perfil estudiante o el padrón está en uso

  /estudiantes/me:
    get:
      summary: Obtener el perfil estudiante del usuario autenticado
      tags: [Estudiantes]
      security: [{ CookieAuth: [] }]
      responses:
        '200':
          description: Perfil estudiante del usuario logueado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Estudiante' }
        '401':
          description: Token ausente o inválido
        '404':
          description: El usuario no tiene perfil estudiante asociado

  /estudiantes/{id}:
    get:
      summary: Obtener un estudiante por id (admin o profesor)
      tags: [Estudiantes]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Estudiante encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Estudiante' }
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos
        '404':
          description: Estudiante no encontrado
    put:
      summary: Reemplazar los datos de un estudiante (sólo admin)
      tags: [Estudiantes]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [padron, carrera, anio_ingreso, activo]
              properties:
                padron: { type: integer }
                carrera: { type: string }
                anio_ingreso: { type: integer, description: "Entre 1900 y el año actual + 1" }
                activo: { type: boolean }
      responses:
        '204':
          description: Estudiante actualizado
        '400':
          description: Body inválido
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos (sólo admin)
        '404':
          description: Estudiante no encontrado
        '409':
          description: Padrón en uso por otro estudiante
    patch:
      summary: Modificación parcial. Admin puede modificar cualquier campo; el propio estudiante sólo `carrera`.
      tags: [Estudiantes]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                padron: { type: integer }
                carrera: { type: string }
                anio_ingreso: { type: integer, description: "Entre 1900 y el año actual + 1" }
                activo: { type: boolean }
      responses:
        '200':
          description: Estudiante actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  estudiante: { $ref: '#/components/schemas/Estudiante' }
        '400':
          description: Body inválido (campos desconocidos o vacío)
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos para modificar este estudiante o este campo
        '404':
          description: Estudiante no encontrado
        '409':
          description: Padrón en uso por otro estudiante
    delete:
      summary: Dar de baja el perfil estudiante (soft delete, sólo admin)
      tags: [Estudiantes]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Estudiante dado de baja
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos (sólo admin)
        '404':
          description: Estudiante no encontrado

  # ================= ABM PROFESORES =================
  /profesores:
    get:
      summary: Listar perfiles de profesor (con datos del usuario asociado)
      tags: [Profesores]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: departamento
          in: query
          schema: { type: string }
        - name: titulo
          in: query
          schema: { type: string }
        - name: activo
          in: query
          schema: { type: boolean }
        - name: usuario_id
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Lista de profesores
          content:
            application/json:
              schema:
                type: object
                properties:
                  profesores:
                    type: array
                    items: { $ref: '#/components/schemas/Profesor' }
                  total: { type: integer }
                  page: { type: integer }
                  page_size: { type: integer }
                  total_paginas: { type: integer }
        '204':
          description: Sin resultados
        '400':
          description: Filtro no permitido
        '401':
          description: Token ausente o inválido
    post:
      summary: Crear un perfil profesor para un usuario existente (sólo admin)
      tags: [Profesores]
      security: [{ CookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario_id, legajo, titulo, departamento, fecha_ingreso]
              properties:
                usuario_id: { type: integer }
                legajo: { type: integer }
                titulo: { type: string }
                departamento: { type: string }
                fecha_ingreso: { type: string, format: date, description: "YYYY-MM-DD; no futura" }
      responses:
        '201':
          description: Perfil profesor creado
        '400':
          description: Body inválido
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos (sólo admin)
        '404':
          description: No existe el usuario indicado
        '409':
          description: El usuario ya tiene perfil profesor o el legajo está en uso

  /profesores/me:
    get:
      summary: Obtener el perfil profesor del usuario autenticado
      tags: [Profesores]
      security: [{ CookieAuth: [] }]
      responses:
        '200':
          description: Perfil profesor del usuario logueado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profesor' }
        '401':
          description: Token ausente o inválido
        '404':
          description: El usuario no tiene perfil profesor asociado

  /profesores/{id}:
    get:
      summary: Obtener un profesor por id (admin o docente)
      tags: [Profesores]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Profesor encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profesor' }
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos
        '404':
          description: Profesor no encontrado
    put:
      summary: Reemplazar los datos de un profesor (sólo admin)
      tags: [Profesores]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [legajo, titulo, departamento, fecha_ingreso, activo]
              properties:
                legajo: { type: integer }
                titulo: { type: string }
                departamento: { type: string }
                fecha_ingreso: { type: string, format: date }
                activo: { type: boolean }
      responses:
        '204':
          description: Profesor actualizado
        '400':
          description: Body inválido
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos (sólo admin)
        '404':
          description: Profesor no encontrado
        '409':
          description: Legajo en uso por otro profesor
    patch:
      summary: Modificación parcial. Admin puede modificar cualquier campo; el propio docente sólo `titulo` y `departamento`.
      tags: [Profesores]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                legajo: { type: integer }
                titulo: { type: string }
                departamento: { type: string }
                fecha_ingreso: { type: string, format: date }
                activo: { type: boolean }
      responses:
        '200':
          description: Profesor actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  profesor: { $ref: '#/components/schemas/Profesor' }
        '400':
          description: Body inválido (campos desconocidos o vacío)
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos para modificar este profesor o este campo
        '404':
          description: Profesor no encontrado
        '409':
          description: Legajo en uso por otro profesor
    delete:
      summary: Dar de baja el perfil profesor (soft delete, sólo admin)
      tags: [Profesores]
      security: [{ CookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Profesor dado de baja
        '401':
          description: Token ausente o inválido
        '403':
          description: No tenés permisos (sólo admin)
        '404':
          description: Profesor no encontrado

  # ================= ABM EVALUACIONES =================
  /evaluaciones:
    get:
      summary: Listar evaluaciones (Notas)
      tags: [Evaluaciones]
      parameters:
        - name: curso_id
          in: query
          required: true
          schema: { type: integer }
        - name: tipo_id
          in: query
          schema: { type: integer }
          description: Filtrar por ID de tipo de evaluación (Parcial, TP, etc.)
        - name: alumno_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Listado de notas obtenido

  /evaluaciones/tipos:
    get:
      summary: Listar tipos de evaluación disponibles
      description: Utilizado por el frontend para poblar selectores de formularios.
      tags: [Evaluaciones]
      responses:
        '200':
          description: Tipos de evaluación obtenidos

  /evaluaciones/notas:
    post:
      summary: Cargar nota a un alumno
      tags: [Evaluaciones]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alumno_id: { type: integer }
                tipo_evaluacion_id: { type: integer }
                curso_id: { type: integer }
                nota: { type: number }
                fecha: { type: string, format: date }
      responses:
        '201':
          description: Nota cargada correctamente

  # ================= ABM EQUIPOS =================
  /equipos:
    get:
      summary: Listar equipos
      tags: [Equipos]
      parameters:
        - name: curso_id
          in: query
          required: true
          schema: { type: integer }
        - name: alumno_id
          in: query
          schema: { type: integer }
        - name: evaluacion_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Lista de equipos del curso
    post:
      summary: Crear equipo asociado a un TP y asignar integrantes
      tags: [Equipos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                curso_id: { type: integer }
                tp_id: { type: integer, description: "ID de la evaluación tipo TP vinculada" }
                alumno_ids: 
                  type: array
                  items: { type: integer }
      responses:
        '201':
          description: Equipo e integrantes configurados con éxito

  # ================= ASISTENCIA Y QR =================
  /asistencia/generar-qr:
    post:
      summary: Generar parámetro para código dinámico o enviar por email
      tags: [Asistencia]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clase_id: { type: integer }
                fecha: { type: string, format: date } # creo que no es necesario porque estaria en registro 'clase'
      responses:
        '200':
          description: Token de asistencia generado con éxito

  /asistencia/registrar:
    post:
      summary: Registrar asistencia en el sistema
      tags: [Asistencia]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_token: { type: string, description: "Token dinámico o estático recuperado" }
                curso_id: { type: integer } # esto no seria necesario, el qr token podria tener la clase_id encripdata y que la pueda pasar directamente
                alumno_id: { type: integer }
      responses:
        '200':
          description: Presente registrado en la base de datos

  # ================= REPORTES (PDF) =================
  /reportes/alumnos:
    get:
      summary: Descargar PDF con listado de alumnos de un curso
      tags: [Reportes]
      parameters:
        - name: materia_id
          in: query
          schema: { type: integer }
        - name: curso_id
          in: query
          schema: { type: integer }
        - name: tipo_id
          in: query
          description: (profesor, alumno, ayudante de catedra, etc)
          schema: { type: integer }
        - name: estado
          in: query
          schema: { type: string, enum: [activos, baja] }
      responses:
        '200':
          description: Documento binario PDF listo para descarga
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /reportes/estadisticas:
    get:
      summary: Descargar PDF con estadísticas de aprobación de un curso
      description: Es obligatorio enviar 'curso_id' o 'materia_id'. Si se envían ambos, predomina 'curso_id'.
      tags: [Reportes]
      parameters:
        - name: curso_id
          in: query
          schema: { type: integer }
        - name: materia_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Estadísticas en PDF generadas
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /reportes/equipos:
    get:
      summary: Descargar PDF con listado de equipos de un curso
      description: Es obligatorio enviar 'curso_id' o 'evaluacion_id'. Si se envían ambos, predomina 'evaluacion_id'.
      tags: [Reportes]
      parameters:
        - name: curso_id
          in: query
          schema: { type: integer }
        - name: evaluacion_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Estructura de equipos en PDF generada
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ================= MATERIALES =================
  /materiales:
    get:
      summary: Ver material didáctico público de un curso
      tags: [Materiales]
      security: [] 
      parameters:
        - name: curso_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Listado de recursos públicos obtenido
    post:
      summary: Subir nuevo archivo de material de estudio
      tags: [Materiales]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                titulo: { type: string }
                curso_id: { type: integer }
                archivo: { type: string, format: binary }
      responses:
        '201':
          description: Archivo cargado y asociado al curso

# ================= CLASES =================
  /clases:
    get:
      summary: Listar todas las clases (Admin)
      description: Retorna un listado global de todas las clases programadas. Permite filtrar por estado o fecha.
      tags:
        - Clases
      parameters:
        - name: status
          in: query
          required: false
          description: Filtrar por estado de la clase
          schema:
            type: string
            enum: [pendiente, suspendida, en curso, finalizada]
        - name: fecha
          in: query
          required: false
          description: Filtrar por fecha específica (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: profesor_id
          in: query
          required: false
          description: Filtrar por profesor
          schema:
            type: integer
        - name: curso_id
          in: query
          required: false
          description: Filtrar por curso
          schema:
            type: integer
        - name: activa
          in: query
          required: false
          description: Filtrar por soft delete
          schema:
            type: boolean
            enum: [true, false]
      responses:
        '200':
          description: Listado de clases obtenido con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  clases:
                    type: array
                    items:
                      $ref: "#/components/schemas/Clase"
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'

    post:
      summary: Planificar una nueva clase (Admin)
      description: Crea y agenda una nueva clase para un curso y profesor específico.
      tags:
        - Clases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaseInput'
      responses:
        '201':
          description: Clase planificada correctamente.
          headers:
            Location:
              description: URI del recurso creado
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                  id:
                    type: integer
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /clases/estados:
    get:
      summary: Obtener los estados válidos de las clases
      description: Devuelve la lista de strings permitidos para el campo status de una clase, basados en el ENUM de la base de datos.
      tags:
        - Clases
      responses:
        '200':
          description: Lista de estados obtenida exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  estados:
                    type: array
                    description: Estados válidos para el filtrado y creación de clases.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        nombre:
                          type: string
                          enum:
                            - pendiente
                            - suspendida
                            - en curso
                            - finalizada
                    example:
                      - id: 1
                        nombre: pendiente
                      - id: 2
                        nombre: suspendida
                      - id: 3
                        nombre: en curso
                      - id: 4
                        nombre: finalizada

  /clases/{id}:
    get:
      summary: Obtener detalle de una clase (Todos los roles)
      tags:
        - Clases
      parameters:
        - name: id
          in: path
          required: true
          description: ID numérico de la clase
          schema:
            type: integer
      responses:
        '200':
          description: Detalle de la clase encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clase'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'

    put:
      summary: Modificación total de una clase (Admin / Profesor)
      description: Reprograma o edita todos los campos de una clase existente. Los profesores solo modifican sus clases asignadas.
      tags:
        - Clases
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaseInput'
      responses:
        '200':
          description: Clase actualizada correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

    patch:
      summary: Modifica parcialmente la clase (Admin / Profesor)
      description: Flujo dinámico para pasar la clase entre estados (pendiente, en curso, finalizada, suspendida).
      tags:
        - Clases
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaseInput'
      responses:
        '200':
          description: Estado actualizado correctamente.
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'

    delete:
      summary: Eliminar una clase (Admin)
      description: Realiza un soft delete de la clase si no tiene restricciones activas.
      tags:
        - Clases
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Clase eliminada con éxito.
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'